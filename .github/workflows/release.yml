name: Release toolbox
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Release toolbox
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
      - name: Package toolbox
        uses: matlab-actions/run-build@v3
        with:
          tasks: package
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{  github.ref_name }} matstache.mltbx
